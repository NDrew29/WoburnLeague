<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Standings - Woburn Hockey League</title>

  <!-- FAVICON -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <!-- Styles -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  
  <script src="script.js" defer></script>
</head>
<body>
  <header></header>
  <section>
    <div class="container">
      <h2>Standings</h2>
      <p>2025 - 2026 Regular Season Standings</p>

      <table class="standings-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Team</th>
            <th>GP</th>
            <th>W</th>
            <th>L</th>
            <th>SL</th>
            <th>Pts</th>
            <th>GF</th>
            <th>GA</th>
            <th>Diff</th>
            <th>Streak</th>
          </tr>
        </thead>
        <tbody>
            <!-- White -->
            <tr>
              <td>1</td>
              <td>White</td>
              <td>15</td>
              <td>12</td>
              <td>2</td>
              <td>1</td>
              <td>25</td>
              <td>77</td>
              <td>60</td>
              <td>+17</td>
              <td>W9</td>
            </tr>
          
            <!-- Red -->
            <tr>
              <td>2</td>
              <td>Red</td>
              <td>15</td>
              <td>8</td>
              <td>4</td>
              <td>3</td>
              <td>19</td>
              <td>88</td>
              <td>76</td>
              <td>+12</td>
              <td>L2</td>
            </tr>
          
            <!-- Green -->
            <tr>
              <td>3</td>
              <td>Green</td>
              <td>15</td>
              <td>6</td>
              <td>7</td>
              <td>2</td>
              <td>14</td>
              <td>84</td>
              <td>92</td>
              <td>-8</td>
              <td>W1</td>
            </tr>
          
            <!-- Black -->
            <tr>
              <td>4</td>
              <td>Black</td>
              <td>15</td>
              <td>4</td>
              <td>11</td>
              <td>0</td>
              <td>8</td>
              <td>72</td>
              <td>82</td>
              <td>-10</td>
              <td>L1</td>
            </tr>
          </tbody>
      </table>

    </div>
  </section>
  <footer></footer>
  <script>
document.addEventListener("DOMContentLoaded", () => {
    const table = document.querySelector(".standings-table");
    const headers = table.querySelectorAll("th");

    headers.forEach((header, index) => {
        header.addEventListener("click", () => {
            sortTable(table, index);
        });
    });

    function sortTable(table, colIndex) {
        const tbody = table.querySelector("tbody");
        const rows = Array.from(tbody.querySelectorAll("tr"));
        const isNumeric = !isNaN(rows[0].children[colIndex].innerText.trim().replace('+', ''));

        const currentDir = headers[colIndex].dataset.sortDir === "asc" ? "desc" : "asc";
        headers.forEach(h => h.dataset.sortDir = ""); 
        headers[colIndex].dataset.sortDir = currentDir;

        rows.sort((a, b) => {
            let A = a.children[colIndex].innerText.trim().replace('+', '');
            let B = b.children[colIndex].innerText.trim().replace('+', '');

            if (isNumeric) {
                A = parseFloat(A);
                B = parseFloat(B);
                return currentDir === "asc" ? A - B : B - A;
            } else {
                return currentDir === "asc"
                    ? A.localeCompare(B)
                    : B.localeCompare(A);
            }
        });

        rows.forEach(row => tbody.appendChild(row));
    }
});
</script>

</body>
</html>
